name: eeyadty
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.9.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter


    #logic libs
  freezed_annotation: ^3.1.0
  flutter_bloc: ^9.1.1
  provider: ^6.1.5
  get_it: ^9.2.0
  injectable: ^2.7.1+4
  json_annotation: ^4.10.0
  shared_preferences: ^2.5.4
  dio: ^5.9.1


  #others
  flash: ^3.1.1
  easy_localization: ^3.0.8
  flutter_svg: ^2.2.3
  intl_phone_number_input: ^0.7.4
  image_picker: ^1.2.1
  permission_handler: ^12.0.1
  device_info_plus: ^12.3.0
  cached_network_image: ^3.4.1
  flutter_launcher_icons: ^0.14.4

  # Logging Interceptor
  logging: ^1.3.0

  retrofit: ^4.9.2
  pretty_dio_logger: ^1.4.0
  dio_smart_retry: ^7.0.1

  flutter_timer_countdown: ^1.0.7
  flutter_timezone: ^5.0.1
  jiffy: ^6.4.4
  flutter_native_splash: ^2.4.7
  infinite_scroll_pagination: ^5.1.1
  path_provider: ^2.1.5
  dropdown_button2: ^2.3.9
  pin_code_fields: ^8.0.1
  shimmer: ^3.0.0


  flutter_localizations:
    sdk: flutter

  swipe_image_gallery: ^0.11.0

  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  injectable_generator: ^2.12.0
  build_runner: ^2.11.1
  json_serializable: ^6.12.0
  freezed: ^3.2.5
  retrofit_generator: ^10.2.3
  flutter_gen_runner: ^5.12.0

flutter_gen:
  output: lib/gen/ # Optional (default: lib/gen/)
  line_length: 80 # Optional (default: 80)

  integrations:
    flutter_svg: true
    rive: true

  assets:
    enabled: true

    outputs:
      class_name: MyAssets
      package_parameter_enabled: false
      style: dot-delimiter


flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/svg/
    - assets/images/png/
    - assets/images/png/avatars/
    - assets/translations/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/outfit/Outfit-Thin.ttf
          weight: 100
        - asset: assets/fonts/outfit/Outfit-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/outfit/Outfit-Light.ttf
          weight: 300
        - asset: assets/fonts/outfit/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/outfit/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/outfit/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/outfit/Outfit-Bold.ttf
          weight: 700
        - asset: assets/fonts/outfit/Outfit-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/outfit/Outfit-Black.ttf
          weight: 900

    - family: Noto
      fonts:
        - asset: assets/fonts/noto/NotoSansArabic-Light.ttf
          weight: 300
        - asset: assets/fonts/noto/NotoSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/noto/NotoSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/noto/NotoSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/noto/NotoSansArabic-Bold.ttf
          weight: 700
        - asset: assets/fonts/noto/NotoSansArabic-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/noto/NotoSansArabic-Black.ttf
          weight: 900
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
