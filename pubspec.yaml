name: eeyadty
description: "Clinic appointment booking app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.10.0

  # DI
  get_it: ^9.2.0

  # Backend
  supabase_flutter: ^2.8.4

  # Storage
  shared_preferences: ^2.5.4

  # Image
  image_picker: ^1.2.1
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  freezed: ^3.2.5
  json_serializable: ^6.9.0

assets:
  - assets/images/
  - assets/images/svg/
  - assets/images/png/
  - assets/translations/
  - assets/fonts


flutter:
  uses-material-design: true
  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/outfit/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/outfit/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/outfit/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/outfit/Outfit-Bold.ttf
          weight: 700
